name: Sync Notion → Website

on:
  schedule:
    - cron: '0 22 * * *'   # 每天 UTC 22:00（北京时间次日 06:00）
  workflow_dispatch:        # 允许在 GitHub 网页手动点「Run workflow」

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "FFC Sync Bot"
          git config user.email "actions@github.com"
          git add assets/notion-data.js
          if git diff --staged --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: sync content from Notion"
            git push
          fi
